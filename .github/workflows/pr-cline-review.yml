name: Gemini 3.1 AI Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # 스킵의 원인이었던 if 문을 삭제했습니다. 이제 모든 PR에서 무조건 실행됩니다.
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Run Gemini Review
        env:
          GEMINI_API_KEY_VAL: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.CLINE_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python - <<EOF
          import os
          import requests
          import sys
          from google import genai

          api_key = os.getenv("GEMINI_API_KEY_VAL")
          github_token = os.getenv("GITHUB_TOKEN")
          
          if not api_key:
              print("❌ 에러: GEMINI_API_KEY 시크릿을 찾을 수 없습니다.")
              sys.exit(1)
          
          if not github_token:
              print("❌ 에러: GITHUB_TOKEN(CLINE_PAT)을 찾을 수 없습니다.")
              sys.exit(1)

          try:
              client = genai.Client(api_key=api_key)

              headers = {"Authorization": f"token {github_token}"}
              url = f"https://api.github.com/repos/{os.getenv('REPO')}/pulls/{os.getenv('PR_NUMBER')}"
          
              # Diff 가져오기
              diff_response = requests.get(f"{url}.diff", headers={"Accept": "application/vnd.github.v3.diff", **headers})
              if diff_response.status_code != 200:
                  print(f"❌ Diff 가져오기 실패: {diff_response.status_code}")
                  sys.exit(1)
          
              diff_data = diff_response.text

              # AI 리뷰 생성
              prompt = f"너는 시니어 안드로이드 엔지니어다. 아래 코드 변경사항을 리뷰하고 버그, 아키텍처, 개선점을 한국어로 요약해줘.\n\n{diff_data}"
              response = client.models.generate_content(model="gemini-3.1-pro-preview", contents=prompt)

              # 리뷰 작성
              comment_url = f"{url}/reviews"
              payload = {"body": f"### 🤖 Gemini 3.1 Pro AI Review\n\n{response.text}", "event": "COMMENT"}
              res = requests.post(comment_url, headers=headers, json=payload)
          
              if res.status_code == 201 or res.status_code == 200:
                  print("✅ 리뷰 작성이 완료되었습니다.")
              else:
                  print(f"❌ 리뷰 작성 실패: {res.status_code}, {res.text}")

          except Exception as e:
              print(f"❌ 에러 발생: {str(e)}")
              sys.exit(1)
          EOF