name: AI Code Reviewer (Gemini 3.1)

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI PR Reviewer
        uses: fluxninja/ai-pr-reviewer@main
        env:
          GITHUB_TOKEN: ${{ secrets.CLINE_PAT }}
          # Google Gemini API 키를 사용합니다.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          debug: false
          # 말씀하신 Gemini 3.1 Pro Preview 모델을 지정합니다.
          openai_heavy_model: google/gemini-3.1-pro-preview
          # 요약 등 가벼운 작업용 모델
          openai_light_model: google/gemini-3-flash-preview
          language: "Korean"
          system_message: |
            너는 세계 최고의 안드로이드 소프트웨어 엔지니어이자 리뷰어이다.
            특히 Kotlin Multiplatform, 안드로이드 SDK 내부 구조, Gradle 최적화에 정통하다.
            사용자가 제출한 코드의 버그, 아키텍처 개선점, 성능 최적화 포인트를 
            꼼꼼하게 분석해서 한국어로 친절하게 답변해줘.