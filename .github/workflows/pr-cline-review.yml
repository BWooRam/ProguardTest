name: Gemini AI Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: AI PR Reviewer (Gemini)
        # 이 경로는 현재 GitHub Actions에서 정상적으로 호출 가능한 실제 주소입니다.
        uses: stremp/ai-pr-reviewer@master
        env:
          GITHUB_TOKEN: ${{ secrets.CLINE_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          # 말씀하신 최신 모델을 명확히 지정합니다.
          model: "gemini-3.1-pro-preview"
          language: "Korean"
          system_message: |
            너는 시니어 안드로이드 소프트웨어 엔지니어다.
            Kotlin, Compose, Clean Architecture 관점에서 코드를 리뷰하고
            한국어로 구체적이고 논리적인 개선 제안을 작성해라.