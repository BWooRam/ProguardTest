name: Gemini 3.1 AI Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # 경고 방지를 위해 최신 버전 사용

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Run Gemini Review
        env:
          # 라이브러리가 요구하는 표준 환경변수명으로 변경
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.CLINE_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python - <<EOF
          import os
          from genai import Client
          import requests

          # 1. 새 라이브러리(google-genai) 방식 설정
          client = Client(api_key=os.getenv("GOOGLE_API_KEY"), http_options={'api_version': 'v1alpha'})

          # 2. PR Diff 가져오기
          headers = {"Authorization": f"token {os.getenv('GITHUB_TOKEN')}"}
          url = f"https://api.github.com/repos/{os.getenv('REPO')}/pulls/{os.getenv('PR_NUMBER')}"
          diff_url = f"{url}.diff"
          diff_response = requests.get(diff_url, headers={"Accept": "application/vnd.github.v3.diff", **headers})
          diff_data = diff_response.text

          # 3. Gemini 3.1 Pro Preview 모델 호출
          prompt = f"너는 시니어 안드로이드 엔지니어다. 아래 코드 변경사항을 리뷰하고 버그, 아키텍처, 개선점을 한국어로 요약해줘.\n\n{diff_data}"
          
          # 새로운 라이브러리 호출 규격
          response = client.models.generate_content(
              model="gemini-3.1-pro-preview",
              contents=prompt
          )

          # 4. GitHub에 리뷰 결과 전송
          comment_url = f"{url}/reviews"
          payload = {
              "body": f"### 🤖 Gemini 3.1 Pro AI Review\n\n{response.text}",
              "event": "COMMENT"
          }
          requests.post(comment_url, headers=headers, json=payload)
          EOF