name: Android Lint Check

on:
  pull_request:
    branches: [ "main", "master" ] # PR의 타겟 브랜치가 main 또는 master일 때 실행

jobs:
  lint:
    name: Run Lint
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소의 코드를 가져옵니다.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 환경을 설정합니다. (AGP 8.x 이상은 JDK 17 권장)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # Gradle 종속성 캐싱을 통해 빌드 속도 향상

      # 3. gradlew 파일에 실행 권한을 부여합니다.
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Lint 검사를 실행합니다.
      - name: Run Lint
        run: ./gradlew lintDebug

      # 5. Lint 검사 결과 리포트를 아티팩트로 업로드합니다. (실패하더라도 업로드)
      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
