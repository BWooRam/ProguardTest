name: Android Coverage Check

on:
  pull_request_target: # Fork PR 환경에서 쓰기 권한을 얻기 위해 pull_request 대신 사용
    branches: [ "main", "develop" ] # PR의 타겟 브랜치가 main 또는 develop일 때 실행

jobs:
  Run-Test-Coverage:
    name: Run Test Coverage
    runs-on: ubuntu-latest
    # Job 레벨에서 권한을 다시 한번 명시합니다.
    permissions:
      pull-requests: write
      contents: read

    steps:
      # 1. 저장소의 코드를 가져옵니다.
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # pull_request_target은 기본적으로 타겟 브랜치(base)를 체크아웃하므로, PR에서 수정한 코드(head)를 명시적으로 체크아웃해야 합니다.
          ref: ${{ github.event.pull_request.head.sha }}

      # 2. Java 환경을 설정합니다.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # Gradle 종속성 캐싱

      # 3. gradlew 파일에 실행 권한을 부여합니다.
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 단위 테스트 실행 및 커버리지 검증 (70% 미만 시 여기서 실패 처리됨)
      - name: Run Coverage Verification
        run: ./gradlew jacocoTestCoverageVerification

      # 5. 커버리지 결과 리포트를 아티팩트로 업로드합니다. (실패하더라도 업로드하여 원인 파악 가능)
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/html/

      # 6. JaCoCo 리포트를 PR 댓글로 작성합니다.
      - name: Add Coverage PR Comment
        uses: madrapps/jacoco-report@v1.6.1
        if: always() # 테스트가 실패하더라도 커버리지 리포트를 댓글로 남김
        with:
          paths: |
            ${{ github.workspace }}/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: Code Coverage Report
          update-comment: true # 기존 댓글이 있으면 업데이트
